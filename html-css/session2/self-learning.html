<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Self Learning</title>

    <link rel="stylesheet"
          href="css/self-learning.css">

</head>

<body>

    <!-- CSS Variables -->

    <section>

        <h2>1. CSS Variables</h2>

        <div class="variable-box">
            This section uses CSS custom properties.
        </div>

    </section>

    <hr>

    <!-- Clamp -->

    <section>

        <h2>2. Clamp Function</h2>

        <h1 class="clamp-heading">
            Responsive Heading
        </h1>

    </section>

    <hr>

    <!-- Grid Template Areas -->

    <section>

        <h2>3. Grid Template Areas</h2>

        <div class="grid-layout">

            <header class="header">
                Header
            </header>

            <aside class="sidebar">
                Sidebar
            </aside>

            <main class="main">
                Main Content
            </main>

            <footer class="footer">
                Footer
            </footer>

        </div>

    </section>

    <hr>

    <!-- Aspect Ratio -->

    <section>

        <h2>4. Aspect Ratio</h2>

        <div class="aspect-card">

            Fixed Aspect Ratio Card

        </div>

    </section>
